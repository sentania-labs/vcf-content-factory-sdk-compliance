id: 51ed9773-aa5b-4c2d-87f3-3934fed34f4b
name: "[VCF Content Factory] Compliance Fleet Overview"
description: >
  Fleet-level compliance posture dashboard. No host picker — every widget is
  self-provider with a pin so the dashboard loads immediately with fleet-wide
  data. Row 1: four KPI scoreboards pinned to the ComplianceWorld aggregate
  resource (total hosts scanned, average score, hosts below threshold, active
  benchmark profile). Row 2: compliance score heatmap across all HostSystem
  resources paired with a sortable host-overview list. Row 3: fleet trend
  chart (average score + hosts below threshold over time) and a live alert
  table scoped to all HostSystem resources.

released: false
version: "1.0.0"

# Pak-shipped MP dashboards ship hidden; the pak install path activates them.
# The renderer no longer defaults hidden=true (reverted in factory 00d3382),
# so this YAML now carries it explicitly.
hidden: true

# NOTE: widget coords are 1-based (platform/gridster convention). The renderer
# passes coords through verbatim as of factory 00d3382 (the old +1 shift was
# deleted), so the top-left widget is authored at (x:1, y:1).

widgets:

  # ── Row 1: Fleet KPIs  (y:0, h:3)  ──────────────────────────────────────────
  # All four scoreboards are self-provider, pinned to vcfcf_compliance/ComplianceWorld.
  # The renderer treats self_provider on Scoreboard as a simple flag — no
  # resourceKindId prefix lookup is performed. The pin field documents the
  # intended resource for human readers and for future renderer enhancements.

  - id: hosts_scanned
    type: Scoreboard
    title: "Hosts Scanned"
    coords: {x: 1, y: 1, w: 3, h: 3}
    self_provider: true
    pin:
      adapter_kind: vcfcf_compliance
      resource_kind: ComplianceWorld
    box_columns: 1
    metrics:
      - adapter_kind: vcfcf_compliance
        resource_kind: ComplianceWorld
        metric_key: Summary|total_hosts
        metric_name: "Total Hosts"
        label: "Hosts Scanned"
        color_method: 1

  - id: avg_score
    type: Scoreboard
    title: "Average Score"
    coords: {x: 4, y: 1, w: 3, h: 3}
    self_provider: true
    pin:
      adapter_kind: vcfcf_compliance
      resource_kind: ComplianceWorld
    box_columns: 1
    show_sparkline: true
    round_decimals: 1
    metrics:
      - adapter_kind: vcfcf_compliance
        resource_kind: ComplianceWorld
        metric_key: Summary|avg_host_score
        metric_name: "Average Host Score"
        label: "Average Score"
        color_method: 0
        red_bound: 80
        orange_bound: 90
        yellow_bound: 95

  - id: below_threshold
    type: Scoreboard
    title: "Below Threshold"
    coords: {x: 7, y: 1, w: 3, h: 3}
    self_provider: true
    pin:
      adapter_kind: vcfcf_compliance
      resource_kind: ComplianceWorld
    box_columns: 1
    show_sparkline: true
    metrics:
      - adapter_kind: vcfcf_compliance
        resource_kind: ComplianceWorld
        metric_key: Summary|hosts_below_threshold
        metric_name: "Hosts Below Threshold"
        label: "Below Threshold"
        color_method: 0
        yellow_bound: 1
        orange_bound: 2
        red_bound: 3

  - id: active_profile
    type: Scoreboard
    title: "Active Profile"
    coords: {x: 10, y: 1, w: 3, h: 3}
    self_provider: true
    pin:
      adapter_kind: vcfcf_compliance
      resource_kind: ComplianceWorld
    box_columns: 1
    metrics:
      - adapter_kind: vcfcf_compliance
        resource_kind: ComplianceWorld
        metric_key: Summary|profile_name
        metric_name: "Profile Name"
        label: "Active Profile"
        color_method: 1
        is_string_metric: true

  # ── Row 2: All-Hosts Overview  (y:3, h:8)  ───────────────────────────────────
  # Heatmap shows compliance score for every HostSystem; color scale runs
  # red (<80) → yellow (<95) → green (≥95). View widget embeds the Compliance
  # Host Overview list sorted worst-first.

  - id: score_heatmap
    type: Heatmap
    title: "Compliance Score by Host"
    coords: {x: 1, y: 4, w: 5, h: 8}
    self_provider: true
    pin:
      adapter_kind: VMWARE
      resource_kind: HostSystem
    mode: all
    depth: 10
    configs:
      - name: "Compliance Score"
        adapter_kind: VMWARE
        resource_kind: HostSystem
        color_by:
          metric_key: "VCF-CF Compliance|score"
          label: "Compliance Score"
        group_by: {}
        color:
          min_value: 0
          thresholds:
            values: [0, 80, 95]
            colors: ["#DE3F30", "#ECC33E", "#74B43B"]
        solid_coloring: false
        focus_on_groups: false

  - id: host_overview_view
    type: View
    title: "Compliance Host Overview"
    coords: {x: 6, y: 4, w: 7, h: 8}
    self_provider: true
    pin:
      adapter_kind: VMWARE
      resource_kind: HostSystem
    view: "[VCF Content Factory] Compliance Host Overview"

  # ── Row 3: Fleet Trends + Alerts  (y:11, h:7)  ───────────────────────────────
  # MetricChart overlays average score and hosts-below-threshold on the same
  # time axis so operators can correlate trend direction with threshold breach
  # count. AlertList shows live warning/major/critical alerts for all hosts.

  - id: fleet_trend
    type: MetricChart
    title: "Fleet Compliance Trend"
    coords: {x: 1, y: 12, w: 6, h: 7}
    self_provider: true
    pin:
      adapter_kind: vcfcf_compliance
      resource_kind: ComplianceWorld
    metrics:
      - adapter_kind: vcfcf_compliance
        resource_kind: ComplianceWorld
        metric_key: Summary|avg_host_score
        metric_name: "Average Score"
        color_method: 2
      - adapter_kind: vcfcf_compliance
        resource_kind: ComplianceWorld
        metric_key: Summary|hosts_below_threshold
        metric_name: "Hosts Below 95%"
        color_method: 2

  - id: fleet_alerts
    type: AlertList
    title: "Fleet Compliance Alerts"
    coords: {x: 7, y: 12, w: 6, h: 7}
    self_provider: true
    pin_to_world: true
    pin:
      adapter_kind: VMWARE
      resource_kind: HostSystem
    mode: all
    depth: 1
    criticality: [2, 3, 4]
    alert_definitions:
      - "AlertDefinition-vcfcf_compliance-vcfcf_compliance_score_degraded"

interactions: []
