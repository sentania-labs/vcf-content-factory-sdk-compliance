103=Review the VCF-CF Compliance properties on the affected host in VCF Operations. Navigate to the host resource and open the Metrics or Properties tab. Each compliance control exposes Actual, Expected, and Description properties that identify exactly which security settings are out of compliance. Focus on controls where the Actual value differs from the Expected value. Sort controls by severity to prioritize remediation effort.
104=Use the VMware Security Configuration Guide (SCG) or CIS Benchmark documentation to understand the remediation steps for each failing control. Most controls map to ESXi advanced settings that can be corrected via PowerCLI (Get-VMHost <hostname> | Get-AdvancedSetting -Name <setting> | Set-AdvancedSetting -Value <expected>) or directly in the vSphere Client under Host > Configure > Advanced System Settings. Apply changes during a maintenance window where possible.
105=After remediating failing controls, wait for the next compliance adapter collection cycle (default 60 minutes) to confirm the score recovers above the alert threshold. If using a custom benchmark profile, verify the profile CSV is current. If the score does not recover after two collection cycles, re-check the failing controls to confirm Actual values changed — some settings require an ESXi service restart or host reboot.
